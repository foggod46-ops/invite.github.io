<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gatsby Party</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{

    width:100%;
    height:100%;

    background:#000;

    overflow-y:auto;

    overflow-x:hidden;
}

/* BODY */

body{

    display:flex;

    justify-content:center;

    align-items:flex-start;
}

/* КАРТИНКА */

.invite{

    width:100vw;

    min-height:100vh;

    object-fit:cover;

    display:block;
}

/* PHONE */

@media(max-width:700px){

.invite{

    width:100vw;

    max-width:none;
}

}

</style>
</head>

<body>

<img src="invite_bd.png" class="invite">

</body>
</html>
