<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gatsby Party</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{

    width:100%;
    min-height:100vh;

    background:#000;

    overflow-y:auto;

    overflow-x:hidden;
}

/* BODY */

body{

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:#000;

    overflow-y:auto;

    overflow-x:hidden;
}
/* КАРТИНКА */

.invite{

    width:100%;

    max-width:700px;

    height:auto;

    display:block;

    margin:auto;
}
/* PHONE */

@media(max-width:700px){

.invite{

    width:100vw;

    max-width:none;
}

.gif{

    position:fixed;

    top:20px;

    right:20px;

    width:140px;

    z-index:10;

    pointer-events:none;

    border-radius:20px; /* закругление */
}

/* PHONE */

@media(max-width:700px){

.gif{

    width:90px;

    top:10px;

    right:10px;
}

}
</style>
</head>

<body>

<img src="invite_bd.png" class="invite">
<img src="sparkles.gif" class="gif">

</body>
</html>
