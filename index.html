<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gatsby Party</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:#d4af37;

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:flex-start;

    padding:20px;

    overflow-y:auto;
}

/* КАРТИНКА ПРИГЛАШЕНИЯ */

.invite{

    width:100%;

    max-width:850px;

    display:block;

    border-radius:20px;

    box-shadow:
    0 0 40px rgba(0,0,0,0.25);
}

/* MOBILE */

@media(max-width:700px){

body{
    padding:10px;
}

.invite{
    border-radius:14px;
}

}

</style>
</head>

<body>

<img src="invite.png" class="invite">

</body>
</html>
