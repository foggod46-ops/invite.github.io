<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gatsby Party</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{

    width:100%;

    min-height:100vh;

    background:#000;

    overflow-y:auto;

    overflow-x:hidden;

    font-family:Arial, sans-serif;
}
/* ЭКРАН ВХОДА */
body{

    display:flex;

    justify-content:center;
}
#startScreen{

    position:fixed;

    inset:0;

    background:#000;

    display:flex;

    justify-content:center;

    align-items:center;

    z-index:100;
}

#enterBtn{

    padding:20px 50px;

    font-size:32px;

    background:#111;

    color:white;

    border:2px solid gold;

    border-radius:20px;

    cursor:pointer;

    transition:0.3s;
}

#enterBtn:hover{

    background:gold;

    color:black;
}

/* САЙТ */

#site{

    display:none;

    width:100%;

    min-height:100vh;
}
.invite{

    width:100%;

    max-width:700px;

    display:block;

    margin:auto;
}
.gif{

    position:fixed;

    top:20px;

    right:20px;

    width:140px;

    z-index:10;

    pointer-events:none;

    border-radius:20px;
}

@media(max-width:700px){

.gif{

    width:90px;

    top:10px;

    right:10px;
}

}
</style>
</head>

<body>

<!-- ЗАСТАВКА -->

<div id="startScreen">
    <button id="enterBtn">НАЖАТЬ</button>
</div>

<!-- САЙТ -->

<div id="site">
    <img src="invite_bd.png" class="invite">
    <img src="sparkles.gif" class="gif">
</div>

<!-- МУЗЫКА -->

<audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>

const btn = document.getElementById('enterBtn');
const music = document.getElementById('bgMusic');

btn.addEventListener('click', () => {

    document.getElementById('startScreen').style.display = 'none';

    document.getElementById('site').style.display = 'block';

    music.play();
});

</script>

</body>
</html>
