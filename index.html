<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gatsby Party</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:#d4af37;

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    overflow:hidden;
}

/* КАРТИНКА */

.invite{

    width:auto;

    height:100vh;

    max-width:100vw;

    display:block;
}

/* PHONE */

@media(max-width:700px){

.invite{

    width:100%;

    height:auto;

    max-height:100vh;

    object-fit:contain;
}

}

</style>
</head>

<body>

<img src="invite_bd.png" class="invite">

</body>
</html>
