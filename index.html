<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gatsby Party</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{

    background:#000;

    overflow-x:hidden;
}

/* BODY */

body{

    display:flex;

    justify-content:center;
}

/* КАРТИНКА */

.invite{

    width:100%;

    max-width:700px;

    display:block;
}

/* PHONE */

@media(max-width:700px){

.invite{

    width:112vw;

    max-width:none;

    margin-left:-6vw;

    margin-top:-35px;
}

}
/* PHONE */

@media(max-width:700px){

.invite{

    width:110vw;

    max-width:none;

    margin-left:-5vw;
}

}

</style>
</head>

<body>

<img src="invite_bd.png" class="invite">

</body>
</html>
